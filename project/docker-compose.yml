version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: taskflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpassword
      MONGO_INITDB_DATABASE: taskflow
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - taskflow-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskflow-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:adminpassword@mongo:27017/taskflow?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-changeme_super_secret_jwt_key_32chars}
      JWT_EXPIRE: 1h
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_refresh_secret_key}
      JWT_REFRESH_EXPIRE: 7d
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    networks:
      - taskflow-net
    volumes:
      - backend_logs:/app/logs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api/v1
    container_name: taskflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - taskflow-net

volumes:
  mongo_data:
  backend_logs:

networks:
  taskflow-net:
    driver: bridge
